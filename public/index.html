<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Evita cache pesado do Vercel -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Paths relativos partem da raiz -->
    <base href="/" />

    <title>LOCCP - LOCALIZADOR DE CP E CS</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- Variável global com a base da API -->
    <script>
      const API_BASE = window.location.origin;
      console.log("API_BASE definida como", API_BASE);
    </script>
  </head>
  <body>
    <header>LOCCP - Sistema</header>
    <div class="container">
      <form id="buscaForm">
        <div class="form-group">
          <label><input type="radio" name="modo" value="cp" checked /> Buscar por CP</label>
          <label><input type="radio" name="modo" value="cp_cs" /> Buscar por CP + CS</label>
        </div>

        <div class="form-group" id="grupo-cp">
          <label for="cp">Digite o número da (CP):</label>
          <input type="text" id="cp" name="cp" placeholder="Ex: 519" />
        </div>

        <div class="form-group" id="grupo-cs">
          <label for="cs">Digite o número da (CS):</label>
          <input type="text" id="cs" name="cs" placeholder="Ex: 243" />
        </div>

        <button type="submit" id="buscarBtn">Buscar</button>
        <button type="button" id="limparBtn">Limpar</button>
        <button type="button" id="mapaBtn">🗺️ Mapa Visual</button>
      </form>

      <div id="resultado"></div>
    </div>

    <div id="loading-overlay">
      <div id="loading-spinner"></div>
    </div>

    <footer>
      Desenvolvido por Caio Henrique Faria - Baramaia Engenharia e Conhecimento - 2025
    </footer>

    <!-- Script externo -->
    <script src="/script.js"></script>
  </body>
</html>
